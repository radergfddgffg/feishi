<div class="memory_enhancement_container">
    <div class="memory_enhancement_settings">
        <div class="inline-drawer">
            <div id="inline_drawer_header_content">
                <b style="font-size: 1.1rem" data-i18n="Memory Enhancement">剧情偏好与文风预设增强</b>
            </div>
            <div class="inline-drawer-content">
                <div id="memory_enhancement_settings_inline_drawer_content">
                    <div class="persona_management_left_column flex-container wide100p flexGap10"
                        style="padding: 10px 0; gap: 10px">
                        <div class="flex1 wide100p" style="min-width: 300px">
                            <h4 class="standoutHeader">预设与文风设定</h4>

                            <!-- 剧情偏好 -->
                            <div style="padding-left: 5px;">
                                <label for="st_plot_preference">剧情偏好选择（Plot Preference）</label>
                                <small class="toggle-description justifyLeft">(输入您期望的剧情发展偏好，将自动注入给AI识别)</small>
                                <textarea id="st_plot_preference" class="wide100p" rows="4"
                                    placeholder="例如：偏好修罗场、日常温馨、废土探险等"></textarea>
                            </div>

                            <!-- 文风选择 -->
                            <div style="padding-left: 5px; margin-top: 15px;">
                                <label for="st_writing_style">文风选择（Writing Style）</label>
                                <small class="toggle-description justifyLeft">(输入您期望AI使用的写作风格，将自动注入给AI识别)</small>
                                <textarea id="st_writing_style" class="wide100p" rows="4"
                                    placeholder="例如：细腻描写、幽默诙谐、冷酷旁白等"></textarea>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
